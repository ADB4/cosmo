services:
  app:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      - COSMO_DB_PATH=/app/chroma_db
      - COSMO_UPLOAD_DIR=/app/uploads
      - COSMO_DECK_DIR=/app/decks
      - OLLAMA_HOST=http://host.docker.internal:11434
    volumes:
      - ./chroma_db:/app/chroma_db
      - uploads:/app/uploads
      - ./decks:/app/decks
      - ./quizzes:/app/quizzes
    networks:
      - internal

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --protocol http2 run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - app
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  uploads: