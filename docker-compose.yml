services:
  app:
    build: ./frontend
    restart: unless-stopped
    networks:
      - internal

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - app
    networks:
      - internal

networks:
  internal:
    driver: bridge